<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐉 NEXUS HUB - Dragon Reborn</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#f8fafc;min-height:100vh}
.login-bg{display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#0f172a,#1e293b)}
.login-box{background:#1e293b;padding:40px;border-radius:16px;border:1px solid #6366f1;text-align:center;max-width:400px;width:90%}
.login-box h1{font-size:28px;margin-bottom:8px}
.login-box p{color:#94a3b8;margin-bottom:24px}
input[type=password]{width:100%;padding:12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#fff;font-size:16px;outline:none}
input:focus{border-color:#6366f1}
button{width:100%;padding:12px;margin-top:16px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
button:hover{background:#4f46e5}
.error{color:#ef4444;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="login-bg" id="loginScreen">
    <div class="login-box">
        <h1>🐉 NEXUS HUB</h1>
        <p>Dragon Reborn sin kommandosentral</p>
        <input type="password" id="keyInput" placeholder="Tilgangsnøkkel..." autofocus>
        <button onclick="login()">TILGANG</button>
        <p class="error" id="errMsg">Feil nøkkel, Asha'man.</p>
    </div>
</div>
<script>
// Auth system
(function(){
    if(localStorage.getItem('nexus_auth') === 'DRAGON_REBORN_2026'){
        showDashboard();
    }
})();
function login(){
    const k = document.getElementById('keyInput').value;
    if(k === 'DRAGON_REBORN' || k === 'tussie' || k === 'shadowspawn'){
        localStorage.setItem('nexus_auth','DRAGON_REBORN_2026');
        showDashboard();
    } else {
        document.getElementById('errMsg').style.display='block';
    }
}
function showDashboard(){
    document.getElementById('loginScreen').innerHTML = `
    <div style="padding:24px;max-width:1200px;margin:0 auto;">
        <h1 style="margin-bottom:24px;">🐉 NEXUS HUB - Kommandosentral</h1>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;">
            <div style="background:#1e293b;padding:24px;border-radius:12px;border:1px solid #334155;">
                <h2>🧠 AI-Minne</h2>
                <p style="color:#94a3b8;margin:8px 0;">Helende minnesystem T1-T12</p>
                <a href="ai-minne/" style="color:#6366f1;">Åpne →</a>
            </div>
            <div style="background:#1e293b;padding:24px;border-radius:12px;border:1px solid #334155;">
                <h2>📊 Hermes Status</h2>
                <p style="color:#94a3b8;margin:8px 0;">Agent-status og helse</p>
                <a href="hermes-status/" style="color:#6366f1;">Åpne →</a>
            </div>
            <div style="background:#1e293b;padding:24px;border-radius:12px;border:1px solid #334155;">
                <h2>🔐 Sikkerhet</h2>
                <p style="color:#94a3b8;margin:8px 0;">Pentest-rapport</p>
                <a href="#" style="color:#6366f1;">Åpne →</a>
            </div>
        </div>
        <button onclick="localStorage.removeItem('nexus_auth');location.reload();" style="margin-top:24px;background:#334155;width:auto;padding:8px 16px;font-size:14px;">Logg ut</button>
    </div>`;
}
document.getElementById('keyInput').addEventListener('keydown',function(e){if(e.key==='Enter')login()});
</script>
</body>
</html>
